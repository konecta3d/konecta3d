<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer dark teal circle -->
  <circle cx="50" cy="50" r="50" fill="#1A4D4A"/>
  <!-- Inner cyan circle -->
  <circle cx="50" cy="50" r="43" fill="#4ECBC4"/>
  <!-- Inner ring border -->
  <circle cx="50" cy="50" r="39.5" fill="none" stroke="#1A4D4A" stroke-width="1.5"/>
  <!-- Dark teal rectangle background for K -->
  <rect x="24" y="21" width="52" height="58" rx="4" fill="#1A4D4A"/>
